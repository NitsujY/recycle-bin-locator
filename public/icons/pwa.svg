<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- background rounded square -->
  <rect width="1024" height="1024" rx="192" fill="url(#g)"/>

  <!-- white pin (circle + triangle tail) with subtle shadow -->
  <g transform="translate(0,0)" filter="url(#shadow)">
    <circle cx="512" cy="320" r="220" fill="#ffffff"/>
    <polygon points="512,560 420,820 604,820" fill="#ffffff"/>
  </g>

  <!-- leaf-shaped recycling symbol inside the pin -->
  <g transform="translate(0,0)">
    <path d="M512 240 C 640 340, 640 520, 512 620 C 384 520, 384 340, 512 240 Z" fill="#027a48" opacity="1"/>
    <path d="M512 300 C 572 340, 572 420, 512 460 C 452 420, 452 340, 512 300 Z" fill="#16a34a"/>
    <path d="M512 340 C 540 360, 540 400, 512 420 C 484 400, 484 360, 512 340 Z" fill="#68d391" opacity="0.95"/>
    <path d="M512 260 L520 270 L512 280 L504 270 Z" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- small highlight on top-left -->
  <ellipse cx="420" cy="245" rx="60" ry="32" fill="#ffffff" opacity="0.06"/>
</svg>
